<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confirming your payment — NKI</title>
  <!-- Design system: fonts (Apercu) + all color/spacing/radius/type tokens + responsive --margin -->
  <link rel="stylesheet" href="wireframe.css" />
  <style>
    /* ══ Mid-checkout: waiting for payment confirmation ══
       All values reference NKI design-system tokens from wireframe.css. */

    body { min-height: 100vh; display: flex; flex-direction: column; }

    /* Minimal secure-checkout header (matches the checkout flow) */
    .pw-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--spacing-20) var(--margin);
      border-bottom: 1px solid var(--border-default);
    }
    .pw-logo img { height: 32px; width: auto; display: block; }
    .pw-secure {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-8);
      font-size: var(--font-size-14);
      font-weight: 500;
      color: var(--text-secondary-on-white);
      white-space: nowrap;
    }

    /* Centered waiting state */
    .pw-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: var(--spacing-32);
      padding: var(--spacing-56) var(--margin) var(--spacing-72);
    }

    /* Loader chip — dark rose-trail on light-green (NKI black-on-green brand) */
    .pw-loader {
      width: 176px;
      height: 176px;
      display: grid;
      place-items: center;
      border-radius: 100px;
      background: var(--feedback-positive-subtle-bg);
      color: var(--text-primary);
    }
    .pw-loader svg { width: 74%; height: 74%; overflow: visible; }

    .pw-copy { display: flex; flex-direction: column; align-items: center; gap: var(--spacing-16); }

    /* Desktop/H1 — font-size/61, Apercu Bold */
    .pw-h1 {
      font-size: var(--font-size-61);
      font-weight: 700;
      line-height: 1.15;
      color: var(--text-primary);
      max-width: 15ch;
      text-wrap: balance;
    }

    /* Desktop/Body-Paragraph — font-size/16 */
    .pw-sub {
      font-size: var(--font-size-16);
      line-height: 1.4;
      color: var(--text-secondary-on-white);
      max-width: 42ch;
    }

    /* Reassurance microcopy — Desktop/Small text, font-size/14 */
    .pw-note {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-8);
      padding: var(--spacing-8) var(--spacing-16);
      border-radius: var(--radius-8);
      background: var(--bg-subtle);
      font-size: var(--font-size-14);
      color: var(--text-secondary-on-white);
    }
    .pw-note svg { flex-shrink: 0; }

    /* Mobile H1 — font-size/32 */
    @media (max-width: 768px) {
      .pw-h1 { font-size: var(--font-size-32); line-height: 1.2; }
      .pw-loader { width: 140px; height: 140px; }
      .pw-main { gap: var(--spacing-24); }
    }
    @media (min-width: 769px) and (max-width: 1024px) {
      .pw-h1 { font-size: var(--font-size-49); }
    }
  </style>
</head>
<body>
  <header class="pw-header">
    <a href="index.html" class="pw-logo" aria-label="NKI — home">
      <img src="logos/NKI_Logo_Black_L.svg" alt="NKI Nettstudier" />
    </a>
    <span class="pw-secure">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="6" width="10" height="7" rx="1"/><path d="M4 6V4a3 3 0 0 1 6 0v2"/></svg>
      Secure Checkout
    </span>
  </header>

  <main class="pw-main">
    <div class="pw-loader" aria-hidden="true">
      <svg viewBox="0 0 100 100" fill="none">
        <g id="group">
          <path id="path" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" opacity="0.12"></path>
        </g>
      </svg>
    </div>

    <div class="pw-copy" role="status" aria-live="polite">
      <h1 class="pw-h1">We are waiting for your payment to be confirmed.</h1>
      <p class="pw-sub">This page will update automatically.</p>
    </div>

    <p class="pw-note">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="6" width="10" height="7" rx="1"/><path d="M4 6V4a3 3 0 0 1 6 0v2"/></svg>
      Please keep this window open — do not refresh or go back.
    </p>
  </main>

  <script>
    const SVG_NS = 'http://www.w3.org/2000/svg';
    const config = {
      rotate: true,
      particleCount: 64,
      trailSpan: 0.38,
      durationMs: 4600,
      rotationDurationMs: 28000,
      pulseDurationMs: 4200,
      strokeWidth: 5.5,
      baseRadius: 7,
      detailAmplitude: 3,
      petalCount: 7,
      curveScale: 3.9,
      point(progress, detailScale, config) {
        const t = progress * Math.PI * 2;
        const petals = Math.round(config.petalCount);
        const x = config.baseRadius * Math.cos(t) - config.detailAmplitude * detailScale * Math.cos(petals * t);
        const y = config.baseRadius * Math.sin(t) - config.detailAmplitude * detailScale * Math.sin(petals * t);
        return { x: 50 + x * config.curveScale, y: 50 + y * config.curveScale };
      },
    };

    const group = document.querySelector('#group');
    const path = document.querySelector('#path');
    path.setAttribute('stroke-width', String(config.strokeWidth));

    const particles = Array.from({ length: config.particleCount }, () => {
      const circle = document.createElementNS(SVG_NS, 'circle');
      circle.setAttribute('fill', 'currentColor');
      group.appendChild(circle);
      return circle;
    });

    const normalizeProgress = (p) => ((p % 1) + 1) % 1;
    function getDetailScale(time) {
      const pulseProgress = (time % config.pulseDurationMs) / config.pulseDurationMs;
      return 0.52 + ((Math.sin(pulseProgress * Math.PI * 2 + 0.55) + 1) / 2) * 0.48;
    }
    function getRotation(time) {
      if (!config.rotate) return 0;
      return -((time % config.rotationDurationMs) / config.rotationDurationMs) * 360;
    }
    function buildPath(detailScale, steps = 480) {
      return Array.from({ length: steps + 1 }, (_, index) => {
        const point = config.point(index / steps, detailScale, config);
        return `${index === 0 ? 'M' : 'L'} ${point.x.toFixed(2)} ${point.y.toFixed(2)}`;
      }).join(' ');
    }
    function getParticle(index, progress, detailScale) {
      const tailOffset = index / (config.particleCount - 1);
      const point = config.point(normalizeProgress(progress - tailOffset * config.trailSpan), detailScale, config);
      const fade = Math.pow(1 - tailOffset, 0.56);
      return { x: point.x, y: point.y, radius: 0.9 + fade * 2.7, opacity: 0.04 + fade * 0.96 };
    }

    function draw(time) {
      const progress = (time % config.durationMs) / config.durationMs;
      const detailScale = getDetailScale(time);
      group.setAttribute('transform', `rotate(${getRotation(time)} 50 50)`);
      path.setAttribute('d', buildPath(detailScale));
      particles.forEach((node, index) => {
        const p = getParticle(index, progress, detailScale);
        node.setAttribute('cx', p.x.toFixed(2));
        node.setAttribute('cy', p.y.toFixed(2));
        node.setAttribute('r', p.radius.toFixed(2));
        node.setAttribute('opacity', p.opacity.toFixed(3));
      });
    }

    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceMotion) {
      // Static, fully-formed rose — no motion for users who opt out.
      draw(0);
    } else {
      const startedAt = performance.now();
      (function render(now) {
        draw(now - startedAt);
        requestAnimationFrame(render);
      })(performance.now());
    }
  </script>
</body>
</html>
